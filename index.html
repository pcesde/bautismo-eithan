<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bautismo Eithan</title>

<!-- 
    ========================================================================
    CONFIGURACIÓN PARA WHATSAPP (ETIQUETAS OPEN GRAPH)
    ========================================================================
    IMPORTANTE: Reemplaza "TU_USUARIO" y "NOMBRE_REPOSITORIO" con tus datos 
    reales de GitHub para que la vista previa de la foto funcione.
-->
<meta property="og:title" content="¡Invitación al Bautismo de Eithan!" />
<meta property="og:description" content="Te invitamos a sumarte a este gran día. Ingresa aquí para ver todos los detalles 👇" />
<meta property="og:image" content="https://pcesde.github.io/bautismo-eithan/1.png" />
<meta property="og:image:type" content="image/png" />
<meta property="og:image:width" content="1200" />
<meta property="og:image:height" content="630" />
<meta property="og:type" content="website" />

<style>
body {
    margin: 0;
    background: black;
    cursor: pointer; /* Le indica al usuario que la pantalla es interactiva */
    overflow-x: hidden;
}

/* Estilo sutil para avisar que la música está activa */
.indicador-musica {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: rgba(255, 255, 255, 0.2);
    color: white;
    padding: 8px 12px;
    border-radius: 20px;
    font-family: Arial, sans-serif;
    font-size: 12px;
    backdrop-filter: blur(5px);
    z-index: 1000;
    pointer-events: none;
    opacity: 0.7;
}

.galeria {
    display: flex;
    flex-direction: column;
}

.imagen {
    width: 100%;
    height: 100vh;
    /* Estado inicial: oculto y ligeramente desplazado hacia abajo */
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 1.2s ease-out, transform 1.2s ease-out;
}

/* Clase que se aplicará automáticamente al hacer scroll */
.imagen.visible {
    opacity: 1;
    transform: translateY(0);
}

.imagen img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
}
</style>
</head>

<body>

<!-- Mensaje flotante en pantalla -->
<div class="indicador-musica">🎵 Toca la pantalla para activar sonido</div>

<!-- Elemento de audio (oculto) en bucle -->
<audio id="musicaFondo" loop>
    <source src="musica-bautismo.mp3" type="audio/mpeg">
    Tu navegador no soporta el elemento de audio.
</audio>

<!-- Galería de fotos de la invitación -->
<div class="galeria">
    <div class="imagen"><img src="1.png"></div>
    <div class="imagen"><img src="2.png"></div>
    <div class="imagen"><img src="3.png"></div>
    <div class="imagen"><img src="4.png"></div>
    <div class="imagen"><img src="5.png"></div>
    <div class="imagen"><img src="6.png"></div>
</div>

<script>
var audio = document.getElementById('musicaFondo');
var musicaIniciada = false;

// 1. Activa el audio al primer toque en la pantalla
document.addEventListener('click', function() {
    audio.play().then(function() {
        document.querySelector('.indicador-musica').style.display = 'none';
        musicaIniciada = true;
    }).catch(function(error) {
        console.log("Error al reproducir el audio:", error);
    });
}, { once: true });

// 2. Control de estado: Apaga la música al minimizar o cambiar de pestaña
document.addEventListener('visibilitychange', function() {
    if (!musicaIniciada) return;

    if (document.hidden) {
        audio.pause();
    } else {
        audio.play().catch(function(error) {
            console.log("No se pudo reanudar el audio:", error);
        });
    }
});

// 3. Script para la transición suave al hacer scroll
document.addEventListener("DOMContentLoaded", function() {
    var imagenes = document.querySelectorAll('.imagen');
    
    var observer = new IntersectionObserver(function(entries) {
        entries.forEach(function(entry) {
            if (entry.isIntersecting) {
                entry.target.classList.add('visible');
            }
        });
    }, {
        threshold: 0.15 // La animación inicia cuando se ve el 15% de la imagen
    });

    imagenes.forEach(function(img) {
        observer.observe(img);
    });
});
</script>

</body>
</html>
