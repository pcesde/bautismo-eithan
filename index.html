<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bautismo Eithan</title>

<style>
body {
    margin: 0;
    background: black;
    cursor: pointer; /* Indica al usuario que puede hacer clic */
}

.galeria {
    display: flex;
    flex-direction: column;
}

.imagen {
    width: 100%;
    height: 100vh;
}

.imagen img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
}
</style>
</head>

<body>

<!-- Audio oculto configurado para repetirse en bucle -->
<audio id="musicaFondo" loop>
    <source src="musica-bautismo.mp3" type="audio/mpeg">
    Tu navegador no soporta el elemento de audio.
</audio>

<div class="galeria">
    <div class="imagen"><img src="1.png"></div>
    <div class="imagen"><img src="2.png"></div>
    <div class="imagen"><img src="3.png"></div>
    <div class="imagen"><img src="4.png"></div>
    <div class="imagen"><img src="5.png"></div>
    <div class="imagen"><img src="6.png"></div>
</div>

<script>
// Código que activa la música al primer toque en cualquier parte de la pantalla
document.addEventListener('click', function() {
    var audio = document.getElementById('musicaFondo');
    audio.play().catch(function(error) {
        console.log("La reproducción automática fue prevenida por el navegador:", error);
    });
}, { once: true }); // '{ once: true }' asegura que el código solo se ejecute con el primer clic
</script>

</body>
</html>
